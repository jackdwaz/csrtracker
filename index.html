<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Employee Sales Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:15px;
}

h2{text-align:center;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.monthCards{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.monthCard{
padding:8px 14px;
border:1px solid #ccc;
border-radius:8px;
background:white;
cursor:pointer;
}

.monthCard.active{
background:#1f4e79;
color:white;
}

.performanceToggle{
display:flex;
gap:10px;
margin-bottom:10px;
}

.toggleBtn{
padding:6px 12px;
border-radius:6px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.toggleBtn.active{
background:#1f4e79;
color:white;
}

.topBox{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:15px;
}

.card{
background:white;
border-radius:8px;
padding:12px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
font-size:13px;
}

th{
background:#1f4e79;
color:white;
}

.subtotal{
background:#e8eef7;
font-weight:bold;
}

.green{background:#c8f7c5;}
.yellow{background:#fff6b3;}
.red{background:#f7c5c5;}

</style>

</head>

<body>

<h2>Employee Sales Performance</h2>

<div class="controls">

<select id="storeFilter">
<option value="">All Stores</option>
</select>

<input type="text" id="searchEmp" placeholder="Search Emp Name or ID">

</div>

<div class="monthCards" id="monthCards"></div>

<div class="performanceToggle">

<div class="toggleBtn active" onclick="setPerformance('top',this)">Top Performers</div>
<div class="toggleBtn" onclick="setPerformance('low',this)">Lowest Performers</div>

</div>

<div class="topBox">

<div class="card">
<b>Top Qty Sellers</b>
<ol id="topQty"></ol>
</div>

<div class="card">
<b>Top Value Sellers</b>
<ol id="topValue"></ol>
</div>

<div class="card">
<b>Store Leaderboard</b>
<ol id="storeBoard"></ol>
</div>

</div>

<table id="salesTable">

<thead>
<tr id="subtotalRow"></tr>
<tr id="headerRow"></tr>
</thead>

<tbody></tbody>

</table>

<script>

const sheetID="1SF8KI__r5-6pq2pFxAjpkQxr7jNDvOxn2tXhAejSqGo"
const sheetName="Sheet1"

const url=`https://opensheet.elk.sh/${sheetID}/${sheetName}`

let rawData=[]
let months=[]
let activeMonth="All"
let performanceMode="top"

fetch(url)
.then(r=>r.json())
.then(data=>{

rawData=data

detectMonths(data[0])
buildFilters()
buildMonthCards()

render()

})

function detectMonths(row){

Object.keys(row).forEach(c=>{
if(c.includes(" Qty")){
months.push(c.replace(" Qty",""))
}
})

}

function buildFilters(){

let stores=[...new Set(rawData.map(r=>r["Store Name"]))]

let select=document.getElementById("storeFilter")

stores.forEach(s=>{

let opt=document.createElement("option")
opt.value=s
opt.textContent=s

select.appendChild(opt)

})

select.onchange=render
document.getElementById("searchEmp").oninput=render

}

function buildMonthCards(){

let container=document.getElementById("monthCards")

let all=document.createElement("div")
all.className="monthCard active"
all.innerText="All"
all.onclick=()=>selectMonth("All",all)

container.appendChild(all)

months.forEach(m=>{

let c=document.createElement("div")
c.className="monthCard"
c.innerText=m
c.onclick=()=>selectMonth(m,c)

container.appendChild(c)

})

}

function selectMonth(m,el){

activeMonth=m

document.querySelectorAll(".monthCard")
.forEach(c=>c.classList.remove("active"))

el.classList.add("active")

render()

}

function setPerformance(type,el){

performanceMode=type

document.querySelectorAll(".toggleBtn")
.forEach(b=>b.classList.remove("active"))

el.classList.add("active")

renderTop()

}

function getFilteredData(){

let search=document.getElementById("searchEmp").value.toLowerCase()
let store=document.getElementById("storeFilter").value

return rawData.filter(r=>{

let name=(r["Emp Name"]||"").toLowerCase()
let id=(r["Emp ID"]||"").toString().toLowerCase()
let storeName=(r["Store Name"]||"")

return(
(name.includes(search) || id.includes(search)) &&
(store=="" || storeName==store)
)

})

}

function render(){

renderTable()
renderTop()

}

function getValue(r,m,type){

if(type=="qty") return Number(r[m+" Qty"]||0)
return Number(r[m+" Value"]||0)

}

function renderTable(){

let data=getFilteredData()

let header=document.getElementById("headerRow")
let subtotal=document.getElementById("subtotalRow")
let tbody=document.querySelector("#salesTable tbody")

header.innerHTML=""
subtotal.innerHTML=""
tbody.innerHTML=""

header.innerHTML="<th>Rank</th><th>Emp ID</th><th>Name</th><th>Store</th>"
subtotal.innerHTML="<th></th><th></th><th></th><th>Subtotal</th>"

let showMonths=activeMonth=="All"?months:[activeMonth]

showMonths.forEach(m=>{
header.innerHTML+=`<th>${m} Qty</th>`
})

showMonths.forEach(m=>{
header.innerHTML+=`<th>${m} Value</th>`
})

let totalsQty={}
let totalsVal={}

showMonths.forEach(m=>{
totalsQty[m]=0
totalsVal[m]=0
})

let employees=data.map(r=>{

let val=0

if(activeMonth=="All"){
months.forEach(m=>val+=Number(r[m+" Value"]||0))
}else{
val=Number(r[activeMonth+" Value"]||0)
}

return{
data:r,
value:val
}

})

employees.sort((a,b)=>b.value-a.value)

employees.forEach((e,i)=>{

let r=e.data
let tr=document.createElement("tr")

tr.innerHTML=`<td>${i+1}</td>
<td>${r["Emp ID"]}</td>
<td>${r["Emp Name"]}</td>
<td>${r["Store Name"]}</td>`

showMonths.forEach(m=>{

let q=getValue(r,m,"qty")
totalsQty[m]+=q

let cls=q>20?"green":q>10?"yellow":"red"

tr.innerHTML+=`<td class="${cls}">${q}</td>`

})

showMonths.forEach(m=>{

let v=getValue(r,m,"val")
totalsVal[m]+=v

tr.innerHTML+=`<td>₹${v} L</td>`

})

tbody.appendChild(tr)

})

showMonths.forEach(m=>{
subtotal.innerHTML+=`<td class="subtotal">${totalsQty[m]}</td>`
})

showMonths.forEach(m=>{
subtotal.innerHTML+=`<td class="subtotal">₹${totalsVal[m]} L</td>`
})

}

function renderTop(){

let data=getFilteredData()

let arr=data.map(r=>{

let qty=0
let val=0

if(activeMonth=="All"){

months.forEach(m=>{
qty+=Number(r[m+" Qty"]||0)
val+=Number(r[m+" Value"]||0)
})

}else{

qty=Number(r[activeMonth+" Qty"]||0)
val=Number(r[activeMonth+" Value"]||0)

}

return{
name:r["Emp Name"]+" ("+r["Emp ID"]+")",
store:r["Store Name"],
qty:qty,
val:val
}

})

let qtySort=[...arr].sort((a,b)=>b.qty-a.qty)
let valSort=[...arr].sort((a,b)=>b.val-a.val)

if(performanceMode=="low"){
qtySort.reverse()
valSort.reverse()
}

let qtyList=document.getElementById("topQty")
let valList=document.getElementById("topValue")

qtyList.innerHTML=""
valList.innerHTML=""

qtySort.slice(0,5).forEach(e=>{
qtyList.innerHTML+=`<li>${e.name} - ${e.qty}</li>`
})

valSort.slice(0,5).forEach(e=>{
valList.innerHTML+=`<li>${e.name} - ₹${e.val} L</li>`
})

buildStoreBoard(arr)

}

function buildStoreBoard(arr){

let storeTotals={}

arr.forEach(e=>{

if(!storeTotals[e.store]) storeTotals[e.store]=0
storeTotals[e.store]+=e.val

})

let stores=Object.keys(storeTotals).map(s=>{
return{store:s,val:storeTotals[s]}
})

stores.sort((a,b)=>b.val-a.val)

if(performanceMode=="low") stores.reverse()

let board=document.getElementById("storeBoard")
board.innerHTML=""

stores.slice(0,5).forEach(s=>{
board.innerHTML+=`<li>${s.store} - ₹${s.val} L</li>`
})

}

</script>

</body>
</html>
