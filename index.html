<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Employee Sales Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:15px;
}

h2{text-align:center;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.monthCards,.categoryCards,.tlCards{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.cardBtn{
padding:8px 14px;
border:1px solid #ccc;
border-radius:8px;
background:white;
cursor:pointer;
}

.cardBtn.active{
background:#1f4e79;
color:white;
}

.topBox{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:15px;
}

.card{
background:white;
border-radius:8px;
padding:12px;
border:1px solid #ddd;
}

.card ol li{
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
font-size:13px;
}

th{
background:#1f4e79;
color:white;
}

.subtotal{
background:#e8eef7;
font-weight:bold;
}

.drilldownBox{
background:white;
border:1px solid #ccc;
padding:15px;
margin-bottom:15px;
border-radius:8px;
display:none;
}

.backBtn{
padding:6px 12px;
background:#1f4e79;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
}

</style>

</head>

<body>

<h2>Employee Sales Performance</h2>

<div class="controls">

<select id="storeFilter">
<option value="">All Stores</option>
</select>

<input type="text" id="searchEmp" placeholder="Search Emp Name or ID">

</div>

<b>Month</b>
<div class="monthCards" id="monthCards"></div>

<b>Outlet Category</b>
<div class="categoryCards" id="categoryCards"></div>

<b>Team Leader</b>
<div class="tlCards" id="tlCards"></div>


<div class="drilldownBox" id="drilldownBox">

<button class="backBtn" onclick="closeDrilldown()">⬅ Back to TL Ranking</button>

<h3 id="drilldownTitle"></h3>

<table>
<thead id="drillHead"></thead>
<tbody id="drillBody"></tbody>
</table>

</div>


<div class="topBox">

<div class="card">
<b>Top Qty Sellers</b>
<ol id="topQty"></ol>
</div>

<div class="card">
<b>Top Value Sellers</b>
<ol id="topValue"></ol>
</div>

<div class="card">
<b>Outlet Category Ranking</b>
<ol id="catBoard"></ol>
</div>

<div class="card">
<b>TL Performance (Click to Drilldown)</b>
<ol id="tlBoard"></ol>
</div>

</div>


<table id="salesTable">

<thead>
<tr id="subtotalRow"></tr>
<tr id="headerRow"></tr>
</thead>

<tbody></tbody>

</table>

<script>

const sheetID="1SF8KI__r5-6pq2pFxAjpkQxr7jNDvOxn2tXhAejSqGo"
const sheetName="Sheet1"

const url=`https://opensheet.elk.sh/${sheetID}/${sheetName}`

let rawData=[]
let months=[]

let activeMonth="All"
let activeCategory="All"
let activeTL="All"

fetch(url)
.then(r=>r.json())
.then(data=>{

rawData=data

detectMonths(data[0])
buildFilters()
buildCards()

render()

})


function detectMonths(row){

Object.keys(row).forEach(c=>{
if(c.includes(" Qty")){
months.push(c.replace(" Qty",""))
}
})

}


function buildFilters(){

let stores=[...new Set(rawData.map(r=>r["Store Name"]))]

let select=document.getElementById("storeFilter")

stores.forEach(s=>{
let opt=document.createElement("option")
opt.value=s
opt.textContent=s
select.appendChild(opt)
})

select.onchange=render
document.getElementById("searchEmp").oninput=render

}


function buildCards(){

buildCardGroup("monthCards",["All",...months],"month")
buildCardGroup("categoryCards",["All",...new Set(rawData.map(r=>r["Outlet Category"]))],"category")
buildCardGroup("tlCards",["All",...new Set(rawData.map(r=>r["TL Name"]))],"tl")

}


function buildCardGroup(container,items,type){

let div=document.getElementById(container)

items.forEach((item,i)=>{

let c=document.createElement("div")

c.className="cardBtn"+(i==0?" active":"")
c.innerText=item

c.onclick=()=>{

document.querySelectorAll("#"+container+" .cardBtn")
.forEach(x=>x.classList.remove("active"))

c.classList.add("active")

if(type=="month") activeMonth=item
if(type=="category") activeCategory=item
if(type=="tl") activeTL=item

render()

}

div.appendChild(c)

})

}


function getFilteredData(){

let search=document.getElementById("searchEmp").value.toLowerCase()
let store=document.getElementById("storeFilter").value

return rawData.filter(r=>{

let name=(r["Emp Name"]||"").toLowerCase()
let id=(r["Emp ID"]||"").toString().toLowerCase()

return(
(name.includes(search)||id.includes(search)) &&
(store==""||r["Store Name"]==store) &&
(activeCategory=="All"||r["Outlet Category"]==activeCategory) &&
(activeTL=="All"||r["TL Name"]==activeTL)
)

})

}


function render(){

renderTable()
renderLeaderboards()

}


function getValue(r,m,type){

if(type=="qty") return Number(r[m+" Qty"]||0)
return Number(r[m+" Value"]||0)

}


function renderTable(){

let data=getFilteredData()

let header=document.getElementById("headerRow")
let subtotal=document.getElementById("subtotalRow")
let tbody=document.querySelector("#salesTable tbody")

header.innerHTML=""
subtotal.innerHTML=""
tbody.innerHTML=""

header.innerHTML="<th>Rank</th><th>Emp ID</th><th>Name</th><th>Store</th><th>Outlet</th><th>TL</th>"
subtotal.innerHTML="<th></th><th></th><th></th><th></th><th></th><th>Subtotal</th>"

let showMonths=activeMonth=="All"?months:[activeMonth]

showMonths.forEach(m=>header.innerHTML+=`<th>${m} Qty</th>`)
showMonths.forEach(m=>header.innerHTML+=`<th>${m} Value</th>`)

let totalsQty={},totalsVal={}

showMonths.forEach(m=>{
totalsQty[m]=0
totalsVal[m]=0
})

let employees=data.map(r=>{

let val=0

if(activeMonth=="All"){
months.forEach(m=>val+=getValue(r,m,"val"))
}else{
val=getValue(r,activeMonth,"val")
}

return{data:r,value:val}

})

employees.sort((a,b)=>b.value-a.value)

employees.forEach((e,i)=>{

let r=e.data

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${i+1}</td>
<td>${r["Emp ID"]}</td>
<td>${r["Emp Name"]}</td>
<td>${r["Store Name"]}</td>
<td>${r["Outlet Category"]}</td>
<td>${r["TL Name"]}</td>
`

showMonths.forEach(m=>{
let q=getValue(r,m,"qty")
totalsQty[m]+=q
tr.innerHTML+=`<td>${q}</td>`
})

showMonths.forEach(m=>{
let v=getValue(r,m,"val")
totalsVal[m]+=v
tr.innerHTML+=`<td>₹${v} L</td>`
})

tbody.appendChild(tr)

})

showMonths.forEach(m=>subtotal.innerHTML+=`<td>${totalsQty[m]}</td>`)
showMonths.forEach(m=>subtotal.innerHTML+=`<td>₹${totalsVal[m]} L</td>`)

}


function renderLeaderboards(){

let data=getFilteredData()

let qty={},val={},cat={},tl={}

data.forEach(r=>{

let q=0,v=0

if(activeMonth=="All"){
months.forEach(m=>{
q+=getValue(r,m,"qty")
v+=getValue(r,m,"val")
})
}else{
q=getValue(r,activeMonth,"qty")
v=getValue(r,activeMonth,"val")
}

let name=r["Emp Name"]+" ("+r["Emp ID"]+")"

qty[name]=(qty[name]||0)+q
val[name]=(val[name]||0)+v
cat[r["Outlet Category"]]=(cat[r["Outlet Category"]]||0)+v
tl[r["TL Name"]]=(tl[r["TL Name"]]||0)+v

})

buildList("topQty",qty)
buildList("topValue",val,true)
buildList("catBoard",cat,true)
buildTLList(tl)

}


function buildList(id,obj,money=false){

let arr=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,5)

let el=document.getElementById(id)
el.innerHTML=""

arr.forEach(x=>{
el.innerHTML+=`<li>${x[0]} - ${money?"₹"+x[1]+" L":x[1]}</li>`
})

}


function buildTLList(obj){

let arr=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,5)

let el=document.getElementById("tlBoard")
el.innerHTML=""

arr.forEach(x=>{

let li=document.createElement("li")
li.innerText=x[0]+" - ₹"+x[1]+" L"

li.onclick=()=>openDrilldown(x[0])

el.appendChild(li)

})

}


function openDrilldown(tl){

let data=getFilteredData().filter(r=>r["TL Name"]==tl)

document.getElementById("drilldownBox").style.display="block"

document.getElementById("drilldownTitle").innerText="Employees under TL: "+tl

let head=document.getElementById("drillHead")
let body=document.getElementById("drillBody")

head.innerHTML="<tr><th>Rank</th><th>Emp</th><th>Store</th><th>Outlet</th><th>Total Value</th></tr>"
body.innerHTML=""

let arr=data.map(r=>{

let total=0

months.forEach(m=>{
total+=getValue(r,m,"val")
})

return{
name:r["Emp Name"],
store:r["Store Name"],
outlet:r["Outlet Category"],
val:total
}

})

arr.sort((a,b)=>b.val-a.val)

arr.forEach((e,i)=>{
body.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${e.name}</td>
<td>${e.store}</td>
<td>${e.outlet}</td>
<td>₹${e.val} L</td>
</tr>
`
})

}


function closeDrilldown(){

document.getElementById("drilldownBox").style.display="none"

}

</script>

</body>
</html>
