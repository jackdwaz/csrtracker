<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Employee Sales Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:15px;
}

h2{
text-align:center;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.monthCards{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.monthCard{
padding:8px 14px;
background:white;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
}

.monthCard.active{
background:#1f4e79;
color:white;
}

.topBox{
display:flex;
gap:20px;
margin-bottom:15px;
flex-wrap:wrap;
}

.card{
background:white;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
font-size:13px;
}

th{
background:#1f4e79;
color:white;
}

.totals{
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Employee Sales Performance 2026</h2>

<div class="controls">

<select id="storeFilter">
<option value="">All Stores</option>
</select>

<input type="text" id="searchEmp" placeholder="Search Emp Name or ID">

</div>

<div class="monthCards" id="monthCards"></div>

<div class="topBox">

<div class="card">
<b>🏆 Top Qty Seller</b>
<div id="topQty"></div>
</div>

<div class="card">
<b>💰 Top Value Seller</b>
<div id="topValue"></div>
</div>

</div>

<div class="totals" id="totals"></div>

<table id="salesTable">

<thead>
<tr id="headerRow"></tr>
</thead>

<tbody></tbody>

</table>

<script>

const sheetID="1SF8KI__r5-6pq2pFxAjpkQxr7jNDvOxn2tXhAejSqGo";
const sheetName="Sheet1";

const url=`https://opensheet.elk.sh/${sheetID}/${sheetName}`;

let rawData=[];
let months=[];
let activeMonth="All";

fetch(url)
.then(r=>r.json())
.then(data=>{

rawData=data;

detectMonths(data[0]);

buildFilters();

buildMonthCards();

renderTable();

});

function detectMonths(row){

Object.keys(row).forEach(col=>{

if(col.includes(" Qty")){
months.push(col.replace(" Qty",""));
}

});

}

function buildFilters(){

let stores=[...new Set(rawData.map(r=>r["Store Name"]))];

let select=document.getElementById("storeFilter");

stores.forEach(s=>{

let opt=document.createElement("option");
opt.value=s;
opt.textContent=s;

select.appendChild(opt);

});

select.onchange=renderTable;
document.getElementById("searchEmp").oninput=renderTable;

}

function buildMonthCards(){

let container=document.getElementById("monthCards");

container.innerHTML="";

let all=document.createElement("div");
all.className="monthCard active";
all.innerText="All";
all.onclick=()=>selectMonth("All",all);

container.appendChild(all);

months.forEach(m=>{

let card=document.createElement("div");

card.className="monthCard";
card.innerText=m;

card.onclick=()=>selectMonth(m,card);

container.appendChild(card);

});

}

function selectMonth(month,el){

activeMonth=month;

document.querySelectorAll(".monthCard")
.forEach(c=>c.classList.remove("active"));

el.classList.add("active");

renderTable();

}

function renderTable(){

let store=document.getElementById("storeFilter").value.toLowerCase();
let search=document.getElementById("searchEmp").value.toLowerCase();

let header=document.getElementById("headerRow");
let tbody=document.querySelector("#salesTable tbody");

header.innerHTML="";
tbody.innerHTML="";

header.innerHTML=`
<th>Emp ID</th>
<th>Name</th>
<th>Store</th>
`;

let showMonths = activeMonth=="All" ? months : [activeMonth];

showMonths.forEach(m=>{
header.innerHTML+=`<th>${m} Qty</th>`;
});

showMonths.forEach(m=>{
header.innerHTML+=`<th>${m} Value</th>`;
});

let filtered=rawData.filter(r=>{

return(
(!store || r["Store Name"].toLowerCase()==store) &&
(!search || r["Emp Name"].toLowerCase().includes(search) || r["Emp ID"].toLowerCase().includes(search))
);

});

let totalsQty={};
let totalsVal={};

months.forEach(m=>{
totalsQty[m]=0;
totalsVal[m]=0;
});

filtered.forEach(r=>{

let tr=document.createElement("tr");

tr.innerHTML+=`
<td>${r["Emp ID"]}</td>
<td>${r["Emp Name"]}</td>
<td>${r["Store Name"]}</td>
`;

showMonths.forEach(m=>{

let q=Number(r[m+" Qty"]||0);
totalsQty[m]+=q;

tr.innerHTML+=`<td>${q}</td>`;

});

showMonths.forEach(m=>{

let v=Number(r[m+" Value"]||0);
totalsVal[m]+=v;

tr.innerHTML+=`<td>₹${v.toLocaleString()}</td>`;

});

tbody.appendChild(tr);

});

buildTotals(totalsQty,totalsVal);

buildTopPerformers(filtered);

}

function buildTotals(q,v){

let text="";

months.forEach(m=>{
text+=`${m} Qty: ${q[m]} | ${m} Value: ₹${v[m].toLocaleString()} &nbsp;&nbsp;`;
});

document.getElementById("totals").innerHTML=text;

}

function buildTopPerformers(data){

let topQty={name:"",value:0};
let topVal={name:"",value:0};

data.forEach(r=>{

let qty=0;
let val=0;

months.forEach(m=>{
qty+=Number(r[m+" Qty"]||0);
val+=Number(r[m+" Value"]||0);
});

if(qty>topQty.value){
topQty={name:r["Emp Name"]+" ("+r["Emp ID"]+")",value:qty};
}

if(val>topVal.value){
topVal={name:r["Emp Name"]+" ("+r["Emp ID"]+")",value:val};
}

});

document.getElementById("topQty").innerHTML=
`${topQty.name}<br>Qty: ${topQty.value}`;

document.getElementById("topValue").innerHTML=
`${topVal.name}<br>₹${topVal.value.toLocaleString()}`;

}

</script>

</body>
</html>
