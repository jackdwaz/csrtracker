<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Sales Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:15px;
}

h2{text-align:center;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.cardRow{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.cardBtn{
padding:8px 14px;
border-radius:8px;
background:white;
border:1px solid #ccc;
cursor:pointer;
}

.cardBtn.active{
background:#1f4e79;
color:white;
}

.leaderboard{
background:white;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:10px;
}

.lbHeader{
padding:10px;
cursor:pointer;
font-weight:bold;
background:#e8eef7;
}

.lbBody{
display:none;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
font-size:13px;
}

th{
background:#1f4e79;
color:white;
}

.subtotal{
background:#e8eef7;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Employee Sales Performance</h2>

<div class="controls">

<select id="storeFilter">
<option value="">All Stores</option>
</select>

<input type="text" id="searchEmp" placeholder="Search Emp Name or ID">

</div>

<b>Month</b>
<div class="cardRow" id="monthCards"></div>

<b>Outlet Category</b>
<div class="cardRow" id="catCards"></div>

<b>Team Leader</b>
<div class="cardRow" id="tlCards"></div>


<div class="leaderboard">
<div class="lbHeader" onclick="toggleLB(this)">▶ TL Growth</div>
<div class="lbBody"><ol id="tlGrowth"></ol></div>
</div>

<div class="leaderboard">
<div class="lbHeader" onclick="toggleLB(this)">▶ Outlet Category Growth</div>
<div class="lbBody"><ol id="catGrowth"></ol></div>
</div>

<div class="leaderboard">
<div class="lbHeader" onclick="toggleLB(this)">▶ Top Qty Sellers</div>
<div class="lbBody"><ol id="topQty"></ol></div>
</div>

<div class="leaderboard">
<div class="lbHeader" onclick="toggleLB(this)">▶ Top Value Sellers</div>
<div class="lbBody"><ol id="topValue"></ol></div>
</div>

<table id="salesTable">

<thead>
<tr id="subtotalRow"></tr>
<tr id="headerRow"></tr>
</thead>

<tbody></tbody>

</table>

<script>

const sheetID="1SF8KI__r5-6pq2pFxAjpkQxr7jNDvOxn2tXhAejSqGo"
const url=`https://opensheet.elk.sh/${sheetID}/Sheet1`

let rawData=[]
let months=[]
let activeMonth="All"
let activeTL="All"
let activeCat="All"

const allMonths=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

fetch(url)
.then(r=>r.json())
.then(data=>{

rawData=data

detectMonths()
buildFilters()
render()

})

function detectMonths(){

allMonths.forEach(m=>{

let hasData = rawData.some(r => Number(r[m+" 2026 Qty"])>0)

if(hasData) months.push(m)

})

}

function buildFilters(){

let stores=[...new Set(rawData.map(r=>r["Store Name"]))]

stores.forEach(s=>{
let opt=document.createElement("option")
opt.value=s
opt.textContent=s
document.getElementById("storeFilter").appendChild(opt)
})

document.getElementById("storeFilter").onchange=render
document.getElementById("searchEmp").oninput=render

buildCards()

}

function buildCards(){

buildCardGroup("monthCards",["All",...months],"month")
buildCardGroup("catCards",["All",...new Set(rawData.map(r=>r["Outlet Category"]))],"cat")
buildCardGroup("tlCards",["All",...new Set(rawData.map(r=>r["TL Name"]))],"tl")

}

function buildCardGroup(id,list,type){

let container=document.getElementById(id)

list.forEach((x,i)=>{

let btn=document.createElement("div")
btn.className="cardBtn"+(i==0?" active":"")
btn.innerText=x

btn.onclick=()=>{

container.querySelectorAll(".cardBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

if(type=="month") activeMonth=x
if(type=="tl") activeTL=x
if(type=="cat") activeCat=x

render()

}

container.appendChild(btn)

})

}

function getFilteredData(){

let search=document.getElementById("searchEmp").value.toLowerCase()
let store=document.getElementById("storeFilter").value

return rawData.filter(r=>{

let name=(r["Emp Name"]||"").toLowerCase()
let id=(r["Emp ID"]||"").toLowerCase()

return(
(name.includes(search)||id.includes(search)) &&
(store==""||r["Store Name"]==store) &&
(activeTL=="All"||r["TL Name"]==activeTL) &&
(activeCat=="All"||r["Outlet Category"]==activeCat)
)

})

}

function val(r,m,y,t){

return Number(r[m+" "+y+" "+t]||0)

}

function render(){

renderTable()
renderLeaderboards()

}

function renderTable(){

let data=getFilteredData()

let monthsToShow=activeMonth=="All"?months:[activeMonth]

let header=document.getElementById("headerRow")
let subtotal=document.getElementById("subtotalRow")
let tbody=document.querySelector("#salesTable tbody")

header.innerHTML=""
subtotal.innerHTML=""
tbody.innerHTML=""

header.innerHTML="<th>Rank</th><th>Emp ID</th><th>Name</th><th>Store</th><th>Outlet</th><th>TL</th>"
subtotal.innerHTML="<th></th><th></th><th></th><th></th><th></th><th>Subtotal</th>"

monthsToShow.forEach(m=>header.innerHTML+=`<th>${m} Qty</th>`)
monthsToShow.forEach(m=>header.innerHTML+=`<th>${m} Value</th>`)

let totalsQty={},totalsVal={}

monthsToShow.forEach(m=>{
totalsQty[m]=0
totalsVal[m]=0
})

let employees=data.map(r=>{

let total=0
monthsToShow.forEach(m=>total+=val(r,m,"2026","Value"))

return{data:r,total}

})

employees.sort((a,b)=>b.total-a.total)

employees.forEach((e,i)=>{

let r=e.data
let tr=document.createElement("tr")

tr.innerHTML=`
<td>${i+1}</td>
<td>${r["Emp ID"]}</td>
<td>${r["Emp Name"]}</td>
<td>${r["Store Name"]}</td>
<td>${r["Outlet Category"]}</td>
<td>${r["TL Name"]}</td>
`

monthsToShow.forEach(m=>{

let q=val(r,m,"2026","Qty")
totalsQty[m]+=q
tr.innerHTML+=`<td>${q}</td>`

})

monthsToShow.forEach(m=>{

let v=val(r,m,"2026","Value")
totalsVal[m]+=v
tr.innerHTML+=`<td>₹${v.toFixed(1)} L</td>`

})

tbody.appendChild(tr)

})

monthsToShow.forEach(m=>subtotal.innerHTML+=`<td>${totalsQty[m]}</td>`)
monthsToShow.forEach(m=>subtotal.innerHTML+=`<td>₹${totalsVal[m].toFixed(1)} L</td>`)

}

function renderLeaderboards(){

let data=getFilteredData()

let monthsToUse=activeMonth=="All"?months:[activeMonth]

let qty={},val26={},tl={},cat={}

data.forEach(r=>{

let q=0,v26=0,v25=0

monthsToUse.forEach(m=>{
q+=val(r,m,"2026","Qty")
v26+=val(r,m,"2026","Value")
v25+=val(r,m,"2025","Value")
})

let name=r["Emp Name"]+" ("+r["Emp ID"]+")"

qty[name]=(qty[name]||0)+q
val26[name]=(val26[name]||0)+v26

let t=r["TL Name"]
let c=r["Outlet Category"]

tl[t]=(tl[t]||{y25:0,y26:0})
tl[t].y26+=v26
tl[t].y25+=v25

cat[c]=(cat[c]||{y25:0,y26:0})
cat[c].y26+=v26
cat[c].y25+=v25

})

buildList("topQty",qty)
buildList("topValue",val26,true)
buildGrowth("tlGrowth",tl)
buildGrowth("catGrowth",cat)

}

function buildList(id,obj,money=false){

let arr=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,5)

let el=document.getElementById(id)
el.innerHTML=""

arr.forEach((x,i)=>{

let medal=i==0?"🥇 ":i==1?"🥈 ":i==2?"🥉 ":""

el.innerHTML+=`<li>${medal}${x[0]} - ${money?"₹"+x[1].toFixed(1)+" L":x[1]}</li>`

})

}

function buildGrowth(id,obj){

let arr=[]

for(let k in obj){

let y25=obj[k].y25
let y26=obj[k].y26

if(y25==0) continue

let g=((y26-y25)/y25)*100

arr.push([k,y25,y26,g])

}

arr.sort((a,b)=>b[3]-a[3])

let el=document.getElementById(id)
el.innerHTML=""

arr.slice(0,5).forEach((x,i)=>{

let medal=i==0?"🥇 ":i==1?"🥈 ":i==2?"🥉 ":""

el.innerHTML+=`<li>${medal}${x[0]} : ₹${x[1].toFixed(1)}L → ₹${x[2].toFixed(1)}L (${x[3].toFixed(1)}%)</li>`

})

}

function toggleLB(el){

let body=el.nextElementSibling
body.style.display=body.style.display=="block"?"none":"block"

}

</script>

</body>
</html>
